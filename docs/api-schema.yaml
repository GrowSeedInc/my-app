  # ----------------------------------------------------------
  # 管理者 - ユーザー管理
  # ----------------------------------------------------------
  /admin/users:
    get:
      tags: [管理者 - ユーザー管理]
      summary: ユーザー一覧取得（管理者のみ）
      description: 登録ユーザーの一覧を返す。管理者のみアクセス可能。
      operationId: listAdminUsers
      security:
        - sessionCookie: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: q
          in: query
          required: false
          description: 氏名・メールアドレスのキーワード検索
          schema:
            type: string
            example: "山田"
        - name: role
          in: query
          required: false
          description: ロールでフィルタリング
          schema:
            type: string
            enum: [member, admin]
      responses:
        "200":
          description: ユーザー一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'

    post:
      tags: [管理者 - ユーザー管理]
      summary: ユーザー作成（管理者のみ）
      description: 新しいユーザーを作成する。管理者のみ実行可能。
      operationId: createAdminUser
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user]
              properties:
                user:
                  $ref: '#/components/schemas/UserInput'
      responses:
        "302":
          description: 作成成功。ユーザー詳細ページへリダイレクト。
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "422":
          $ref: '#/components/responses/UnprocessableEntity'

  /admin/users/{id}:
    get:
      tags: [管理者 - ユーザー管理]
      summary: ユーザー詳細取得（管理者のみ）
      operationId: showAdminUser
      security:
        - sessionCookie: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        "200":
          description: ユーザー詳細
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [管理者 - ユーザー管理]
      summary: ユーザー更新（管理者のみ）
      description: ユーザー情報を更新する。管理者のみ実行可能。
      operationId: updateAdminUser
      security:
        - sessionCookie: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user]
              properties:
                user:
                  $ref: '#/components/schemas/UserInput'
      responses:
        "302":
          description: 更新成功。ユーザー詳細ページへリダイレクト。
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "422":
          $ref: '#/components/responses/UnprocessableEntity'

    delete:
      tags: [管理者 - ユーザー管理]
      summary: ユーザー削除（管理者のみ）
      description: ユーザーを削除する。管理者のみ実行可能。
      operationId: destroyAdminUser
      security:
        - sessionCookie: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        "302":
          description: 削除成功。ユーザー一覧へリダイレクト。
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
