services:
  # Rails Web Service
  - type: web
    name: my-app-web
    runtime: ruby
    plan: free # 無料プラン
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec rails server"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: my-app-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
databases:
  - name: my-app-db
    plan: free # 無料プラン